<!doctype html>
<html lang="pt-BR" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b1118" />
    <title>Orion Offline</title>
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#offline-content">Ir para conteudo</a>
    <main class="app-shell">
      <section class="workspace" id="offline-content" tabindex="-1">
        <header class="topbar">
          <div>
            <p>Offline</p>
            <h1>Orion</h1>
          </div>
        </header>
        <section class="content-grid">
          <article class="panel stack">
            <div class="panel-heading">
              <h2>Sem conexao local</h2>
              <span class="badge">PWA</span>
            </div>
            <p>Abra novamente quando o servidor local estiver disponivel.</p>
          </article>
        </section>
      </section>
    </main>
  </body>
</html>
