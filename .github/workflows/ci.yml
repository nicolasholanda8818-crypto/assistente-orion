name: CI-CD

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install quality tools
        run: python -m pip install -r requirements-dev.txt

      - name: Ruff lint
        run: python -m ruff check --output-format=github .

      - name: Ruff format
        run: python -m ruff format --check .

      - name: JavaScript syntax
        run: find frontend tests/e2e/static -type f -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Validate PWA
        run: python scripts/validate_pwa.py

      - name: Validate generated Wiki
        run: python scripts/generate_wiki.py --check

      - name: Validate generated changelog
        run: python scripts/generate_changelog.py --check

  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install test tools
        run: python -m pip install -r requirements-dev.txt

      - name: Pytest with coverage
        run: python -m pytest --ignore=tests/e2e --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=80

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  e2e:
    name: E2E browser journeys
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install test tools
        run: python -m pip install -r requirements-dev.txt

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run E2E journeys
        run: python -m pytest tests/e2e -m e2e --browser chromium --tracing retain-on-failure --screenshot only-on-failure

      - name: Upload E2E diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-diagnostics
          path: test-results/
          retention-days: 7

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install security tools
        run: python -m pip install -r requirements-dev.txt

      - name: Bandit source scan
        run: python -m bandit -q -r app

      - name: Dependency audit
        run: python -m pip_audit -r requirements.txt

      - name: Secret scan
        run: python scripts/check_secrets.py

  performance:
    name: Performance baseline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install test tools
        run: python -m pip install -r requirements-dev.txt

      - name: Run isolated performance baseline
        run: python scripts/run_performance.py --output .sandbox-tmp/performance.json --fail-on-threshold

      - name: Upload performance report
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: .sandbox-tmp/performance.json
          retention-days: 7

  build:
    name: Build artifact
    runs-on: ubuntu-latest
    needs: [lint, test, e2e, security, performance]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build release archive
        run: python scripts/build_release.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: orion-foundation
          path: dist/orion-foundation.zip
          retention-days: 14
